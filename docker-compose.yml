# Runs the production Next.js build in a container (same hardware as native — not “cloud offload”).
# Often smoother than `npm run dev` because there is no Turbopack dev watcher.
#
# docker compose build && docker compose up
# Ensure API keys are available: use .env.local (same as local dev) or set env vars in this file.

services:
  web:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
    restart: unless-stopped
